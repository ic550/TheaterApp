<!-- src/main/resources/templates/detail.html -->
<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>公演詳細</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-white">
  <div class="container mt-5">
    <h2 class="text-success" th:text="${performance.title}"></h2>
	
	<!-- 公演詳細ページの一部に追記（ログイン中のユーザー向け） -->
	<div th:if="${loginStatus.loggedIn}">
	  <form th:action="@{${isFavorited} ? '/favorite/remove/' + ${performance.id} : '/favorite/add/' + ${performance.id}}" method="post">
	    <button type="submit" class="btn" th:classappend="${isFavorited} ? 'btn-danger' : 'btn-outline-success'">
	      <span th:text="${isFavorited} ? 'お気に入り解除' : 'お気に入り登録'"></span>
	    </button>
	  </form>
	</div>

    <p><strong>劇場:</strong> <span th:text="${performance.theater}"></span></p>
    <p><strong>日付:</strong> <span th:text="${performance.date}"></span></p>
    <p><strong>時間:</strong> <span th:text="${performance.time}"></span></p>
    <p><strong>出演:</strong> <span th:text="${performance.cast}"></span></p>

    <div class="mt-4">
      <div th:if="${performance.youtubeUrl != null}">
        <iframe width="560" height="315"
                th:src="'https://www.youtube.com/embed/' + ${#strings.substringAfter(performance.youtubeUrl, 'v=')}"
                frameborder="0" allowfullscreen></iframe>
      </div>
      <div th:if="${performance.youtubeUrl == null}">
        <p class="text-warning">予告動画はありません。</p>
      </div>
    </div>
  </div>
</body>
</html>
